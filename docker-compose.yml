services:
  postgres:
    image: postgres:16-alpine
    container_name: karsa_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: karsa
      POSTGRES_PASSWORD: karsa_password
      POSTGRES_DB: karsa_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks: [karsa_network]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karsa -d karsa_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  be-karsa:
    build: .
    container_name: karsa_be
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      NODE_ENV: production
      DATABASE_URL: postgresql://karsa:karsa_password@karsa_postgres:5432/karsa_db?schema=public
      AI_SERVICE_URL: http://karsa_ai:8000
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      JWT_ACCESS_EXPIRES_IN: 15m
      JWT_REFRESH_EXPIRES_IN: 7d
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      GOOGLE_CALLBACK_URL: http://localhost:3001/api/auth/google/callback
      CORS_ORIGIN: http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
    networks: [karsa_network]

  ai-karsa:
    build: ../ai-karsa
    container_name: karsa_ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      AI_SERVICE_TOKEN: ${AI_SERVICE_TOKEN}
      SUMOPOD_BASE_URL: ${SUMOPOD_BASE_URL}
      SUMOPOD_API_KEY: ${SUMOPOD_API_KEY}
      SUMOPOD_MODEL: ${SUMOPOD_MODEL}
      ACTIVE_PROVIDER: ${ACTIVE_PROVIDER:-sumopod}
    networks: [karsa_network]

networks:
  karsa_network:

volumes:
  postgres_data:
